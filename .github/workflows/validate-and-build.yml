name: validate-and-build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml mkdocs-material pymupdf python-docx python-pptx openpyxl

      - name: Validate registry
        working-directory: documentation
        run: python scripts/validate_registry.py

      - name: Regenerate dashboard
        working-directory: documentation
        run: python scripts/build_dashboard.py

      - name: Build site
        working-directory: documentation
        run: python scripts/build_site.py --strict

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: documentation/website/site
